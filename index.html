<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CrithLabs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

:root {
  --main-color: #1a1a1a;
  --accent-color: #005577;
  --background: #f7f7f7;
  --font: 'Inter', sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {

  font-family: var(--font);
  background-color: var(--background);
  color: var(--main-color);
  line-height: 1.6;
  padding: 24px 16px;

}

.container {

  max-width: 480px;
  margin: 0 auto;

}

header {

  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;

}

.logo {

  width: 56px;
  height: 56px;
  border-radius: 8px;
  object-fit: contain;
  background: #ddd;

}

h1 {

  font-size: 1.4rem;
  font-weight: 600;

}

.tagline {

  font-size: 0.9rem;
  color: #666;

}


/* Accordion */

.section {

  border-top: 1px solid #ddd;

}

.section-header {

  padding: 14px 10px;
  cursor: pointer;
  font-weight: 600;
  color: var(--accent-color);
  display: flex;
  justify-content: space-between;
  align-items: center;

}

.section-header:hover {

  background-color: #f0f0f0;

}

.section-content {

  display: none;
  padding: 12px 10px;
  background-color: white;

}

.active .section-content {

  display: block;

}

.section-header::after {

  content: '+';

}

.active .section-header::after {

  content: '-';

}


/* Optional elements you might use later */

.button {

  display: inline-block;
  margin-top: 10px;
  padding: 10px 14px;
  background-color: var(--accent-color);
  color: white;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;

}

.button:hover {

  opacity: 0.9;

}

footer {

  margin-top: 40px;
  text-align: center;
  font-size: 0.85rem;
  color: #666;

}

footer a {

  color: var(--accent-color);
  text-decoration: none;

}

footer a:hover {

  text-decoration: underline;

}

</style>
</head>


<body>


<div class="container">


<header>

<div class="logo"></div>

<div>

<h1>CrithLabs</h1>

<div class="tagline">

Digital file and content verification tools

</div>

</div>

</header>



<!-- SECTION TEMPLATE -->

<div id="section1" class="section active">

<div class="section-header" onclick="toggleSection('section1')">

Section One

</div>

<div class="section-content">

<p>

Editable content area.

</p>

</div>

</div>



<div id="section2" class="section">

<div class="section-header" onclick="toggleSection('section2')">

Section Two

</div>

<div class="section-content">

<p>

Editable content area.

</p>

</div>

</div>



<div id="section3" class="section">

<div class="section-header" onclick="toggleSection('section3')">

Section Three

</div>

<div class="section-content">

<p>

Editable content area.

</p>

</div>

</div>



<div id="section4" class="section">

<div class="section-header" onclick="toggleSection('section4')">

Section Four

</div>

<div class="section-content">

<p>

Editable content area.

</p>

</div>

</div>



<footer>

© CrithLabs

<br><br>

<a href="mailto:crith@crithlabs.com">

Contact

</a>

</footer>



</div>



<script>

function toggleSection(id) {

const allSections = document.querySelectorAll('.section');

allSections.forEach(section => {

if(section.id === id){

section.classList.toggle('active');

}

else{

section.classList.remove('active');

}

});

}

</script>



</body>
</html>
